# ---------------------------------------------------------------------------
# Event-Driven AI Agent Orchestration Platform - Docker Compose
# ---------------------------------------------------------------------------
# Local development stack: Kafka (KRaft), PostgreSQL, Redis,
# OpenTelemetry Collector, Jaeger, Prometheus, Grafana.
# ---------------------------------------------------------------------------
# Usage:
#   1. cp .env.example .env
#   2. docker compose up -d
#   3. docker compose logs -f kafka-init   (verify topic creation)
#   4. Open Grafana at http://localhost:3000 (admin/admin)
#   5. Open Jaeger  at http://localhost:16686
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # Kafka - KRaft Mode (no Zookeeper)
  # -------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.1
    container_name: eventagent-kafka
    user: root
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      - eventagent-network
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # Kafka Topic Initialization (runs once then exits)
  # -------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.8.1
    container_name: eventagent-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - eventagent-network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "---------- Creating Kafka topics ----------"

        KAFKA_BIN="/opt/kafka/bin"
        BOOTSTRAP="kafka:9092"

        # Primary topics
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic clinical.events.raw --partitions 6 --replication-factor 1
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic clinical.events.triaged --partitions 6 --replication-factor 1
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic agent.decisions --partitions 6 --replication-factor 1
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic notifications.outbound --partitions 3 --replication-factor 1

        # Dead Letter Topics
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic clinical.events.raw.DLT --partitions 6 --replication-factor 1
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic clinical.events.triaged.DLT --partitions 6 --replication-factor 1
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --create --if-not-exists \
          --topic agent.decisions.DLT --partitions 6 --replication-factor 1

        echo "---------- Topic creation complete ----------"
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --list
        echo "---------- Done ----------"

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: eventagent-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - eventagent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: eventagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - eventagent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------------------------------------------------------------
  # Jaeger (Distributed Tracing UI)
  # -------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: eventagent-jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - eventagent-network

  # -------------------------------------------------------------------------
  # OpenTelemetry Collector
  # -------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: eventagent-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./infrastructure/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - eventagent-network
    depends_on:
      - jaeger

  # -------------------------------------------------------------------------
  # Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eventagent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - eventagent-network
    depends_on:
      - otel-collector

  # -------------------------------------------------------------------------
  # Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: eventagent-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infrastructure/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - eventagent-network
    depends_on:
      - prometheus
      - jaeger

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  eventagent-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  kafka-data:
  postgres-data:
  redis-data:
