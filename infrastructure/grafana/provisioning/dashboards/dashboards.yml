# ---------------------------------------------------------------------------
# Grafana Dashboard Provisioning
# ---------------------------------------------------------------------------
# Auto-loads dashboard JSON files from the configured folder on startup.
# ---------------------------------------------------------------------------

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
